robot_radius: 0.12

obstacle_layer:
  obstacle_range: 10.0
  raytrace_range: 10.0
  track_unknown_space: true

  # only enable rplidar by default
  observation_sources: rplidar
  rplidar:
    data_type: LaserScan
    topic: /lidar_undistortion/scan
    marking: true
    clearing: true
    inf_is_valid: false
  realsense:
    data_type: PointCloud2
    topic: /locobot/camera/depth/color/points
    marking: true
    clearing: true
    inf_is_valid: false
    min_obstacle_height: -0.15
    max_obstacle_height: 1.0

inflation_layer:
  cost_scaling_factor: 0.5
  inflation_radius: 0.3
